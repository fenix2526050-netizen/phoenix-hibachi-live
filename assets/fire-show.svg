<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
<style>
.bg{fill:#070504}.gold{fill:#ffd779}.orange{fill:#ff9a1f}.red{fill:#e64125}.line{fill:none;stroke:#ffd779;stroke-width:10;stroke-linecap:round;opacity:.55}.steam{fill:none;stroke:#fff8ea;stroke-width:8;stroke-linecap:round;opacity:.32;animation:steam 3s ease-in-out infinite}.flame{transform-origin:450px 405px;animation:f .9s infinite alternate ease-in-out}.spark{fill:#ffd779;animation:s 1.8s infinite ease-in-out}@keyframes f{from{transform:scaleY(.9) rotate(-2deg);opacity:.84}to{transform:scaleY(1.08) rotate(3deg);opacity:1}}@keyframes s{0%{transform:translateY(0) scale(.5);opacity:0}40%{opacity:1}100%{transform:translateY(-120px) scale(0);opacity:0}}@keyframes steam{0%{transform:translateY(40px);opacity:0}35%{opacity:.45}100%{transform:translateY(-95px);opacity:0}}
</style>
<rect class="bg" width="900" height="560"/>
<circle cx="450" cy="155" r="118" fill="#ffd779" opacity=".13"/>
<rect x="110" y="390" width="680" height="22" rx="11" fill="#2a1607"/><rect x="150" y="407" width="600" height="18" rx="9" fill="#ffd779" opacity=".45"/><path class="steam" d="M310 315 C260 250 350 225 315 160"/><path class="steam" style="animation-delay:.5s" d="M455 320 C385 250 510 220 455 145"/><path class="steam" style="animation-delay:1s" d="M590 315 C535 250 620 220 595 155"/><path class="flame red" d="M390 405 C330 330 420 265 445 180 C520 280 580 330 510 405 Z"/><path class="flame orange" style="animation-delay:.18s" d="M430 408 C380 340 455 285 462 215 C520 292 545 350 498 408 Z"/><path class="flame gold" style="animation-delay:.34s" d="M450 405 C420 350 470 315 468 265 C505 330 505 370 485 405 Z"/><circle class="spark" cx="315" cy="315" r="8"/><circle class="spark" style="animation-delay:.4s" cx="550" cy="290" r="7"/><circle class="spark" style="animation-delay:.8s" cx="620" cy="340" r="6"/>
<text x="450" y="506" text-anchor="middle" fill="#ffd779" font-family="Georgia,serif" font-size="38">Fire Show Moment</text>
</svg>